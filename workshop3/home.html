<html>
    <head>
        
    </head>
        <body>
            <h1>ทดลองเขียน JavaScript</h1>
            <script src="script.js"></script>
            <script>
                let student = "อิทธิพล"
                let midterm = 10;
                let final = 10;
                let total = midterm + final;
                document.write("<br>",student,"ได้คะแนนสอบกลางภาค",midterm,"<br>คะแนนปลายภาค",final,"<br>คะแนนรวม",total);
                let grade = null;
                if(total>=80){
                    grade = "A"
                }else if(total>=70){
                    grade = "B";
                }else if(total>=60){
                    grade = "C";
                }else if(total>=50){
                    grade = "D";
                }else{
                    grade = "E";
                }
                document.write("<br><h3>เกรด: ",grade);
            </script>
        </body>
</html>
