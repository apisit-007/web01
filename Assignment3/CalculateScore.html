<!DOCTYPE html>
<html>
<head>
    <title>Calculate Scores</title>
</head>
<body>

<h2>Calculate Scores</h2>

<script>

let scores = [78, 92, 45, 67, 88, 54, 39, 81, 95, 72];

let total = 0;
let pass = 0;
let fail = 0;

document.write("<h3>คะแนนสอบทั้งหมด</h3>");

for(let i=0;i<scores.length;i++){

    document.write("Student " + (i+1) + " : " + scores[i] + "<br>");

    total += scores[i];

    if(scores[i] >= 50){
        pass++;
    }else{
        fail++;
    }

}

let average = total / scores.length;

document.write("<hr>");
document.write("Total Score : " + total + "<br>");
document.write("Average Score : " + average.toFixed(2) + "<br>");
document.write("Pass : " + pass + " คน<br>");
document.write("Fail : " + fail + " คน<br>");

</script>

</body>
</html>
