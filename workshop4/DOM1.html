<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <h1>มหาวิทยาลัยราชภัฏนครปฐม</h1>
        <p id="first">ยินดีต้อนรับ</p>
        <p>นักศึกษาจะได้เรียนรู้</p>
        <p></p>
        <p class="forth"></p>
        <p></p>
        <h1>Nakhon Pathom Rajabhat University</h1>
        <img src="https://cb-courses.npru.ac.th/pluginfile.php/1/core_admin/logo/0x200/1780647799/logo%20credit%20bank3.png">
        <script>
            //const element = document.getElementById("first");
            const element = document.querySelector("#first");
            element.textContent+="ยินดีต้อนรับเข้าสู่เว็บไซต์ของสาขาวิชา";
            const element1 = document.querySelector("h1");
            element1.textContent+="สาขาวิชาวิทยาการคอมพิวเตอร์";
            element1.style.color="green";
            const element2 = document.querySelectorAll("p");
            element2.forEach((paragraph) => {
                paragraph.textContent = "<h2>หลักสูตรวิทยาศาสตร์บัณฑิตสาขาวิชาวิทยาการคอมพิวเตอร์</h2>"
                paragraph.style.fontSize="20px";
            });
            const element3 = document.querySelector(".forth");
            element3.innerHTML="<h2>NPRU</h2>";
            const imgElem = document.querySelector("img");
            imgElem.setAttribute("height",150);
            imgElem.src = "https://sc.npru.ac.th/sc_major/assets/images/app/scilogo.jpg";
            const newH2 = document.createElement("h2");
            newH2.textContent = "Computer Science @ NPRU";
            const newelem = document.body.appendChild(newH2);
            newelem.remove();
        </script>
    </body>
</html>
